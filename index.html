<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColumnarSheet — DuckDB + Quack Spreadsheet</title>
<script src="https://cdn.jsdelivr.net/npm/handsontable@14.6.1/dist/handsontable.full.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.6.1/dist/handsontable.full.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #toolbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #1a1a1a; border-bottom: 1px solid #333; }
  #toolbar h1 { font-size: 18px; color: #f0c040; margin-right: 24px; }
  #toolbar button { padding: 6px 16px; border: 1px solid #444; background: #2a2a2a; color: #ccc; border-radius: 4px; cursor: pointer; font-size: 13px; }
  #toolbar button:hover { background: #3a3a3a; }
  #toolbar button.connected { border-color: #4caf50; color: #4caf50; }
  #toolbar button.disconnected { border-color: #f44336; color: #f44336; }
  #status { font-size: 12px; color: #888; flex: 1; text-align: right; }
  #content { display: flex; flex: 1; overflow: hidden; }
  #grid-container { flex: 1; overflow: hidden; }
  #sidebar { width: 340px; background: #141414; border-left: 1px solid #333; display: flex; flex-direction: column; }
  #sidebar-tabs { display: flex; border-bottom: 1px solid #333; }
  #sidebar-tabs button { flex: 1; padding: 10px; background: none; border: none; color: #888; cursor: pointer; font-size: 13px; }
  #sidebar-tabs button.active { color: #f0c040; border-bottom: 2px solid #f0c040; }
  #ai-panel { flex: 1; display: flex; flex-direction: column; padding: 12px; overflow: hidden; }
  #ai-messages { flex: 1; overflow-y: auto; font-size: 13px; margin-bottom: 12px; }
  #ai-messages .msg { margin-bottom: 8px; padding: 8px; border-radius: 6px; }
  #ai-messages .msg.user { background: #1e3a5f; margin-left: 24px; }
  #ai-messages .msg.assistant { background: #1a2a1a; margin-right: 24px; }
  #ai-messages .msg.sql { font-family: monospace; background: #0d0d0d; padding: 8px; border-radius: 4px; margin: 4px 0; font-size: 12px; color: #7ec87e; }
  #ai-input-area { display: flex; gap: 8px; }
  #ai-input { flex: 1; padding: 8px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; font-size: 13px; }
  #ai-send { padding: 8px 16px; background: #f0c040; color: #0f0f0f; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
  #table-list { padding: 12px; font-size: 13px; }
  #table-list .table-item { padding: 6px 8px; cursor: pointer; border-radius: 4px; }
  #table-list .table-item:hover { background: #2a2a2a; }
  #table-list .table-item.selected { background: #1e3a5f; }
  .handsontable { color: #e0e0e0 !important; }
  .handsontable th { background: #1a1a1a !important; color: #888 !important; }
  .handsontable td { background: #0f0f0f !important; color: #e0e0e0 !important; border-color: #222 !important; }
  .handsontable tr:hover td { background: #1a1a1a !important; }
  .htDimmed { color: #444 !important; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <h1>🦆 ColumnarSheet</h1>
    <button id="btn-quack" class="disconnected" onclick="connectQuack()">Quack: OFF</button>
    <button onclick="addRow()" title="Add row (Ctrl+Enter)">＋ Row</button>
    <button onclick="deleteSelectedRows()" title="Delete selected rows">🗑 Del</button>
    <button id="btn-refresh" onclick="loadTable(currentTable)">⟳</button>
    <button onclick="document.getElementById('csv-upload').click()" title="Import CSV">📥 CSV</button>
    <button onclick="exportCSV()" title="Export to CSV">📤 CSV</button>
    <input id="csv-upload" type="file" accept=".csv" style="display:none" onchange="importCSV(event)">
    <input id="formula-bar" placeholder="Click a cell to see its value, or type SQL..." 
           style="flex:1;padding:5px 12px;background:#0d0d0d;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-family:monospace;font-size:13px;"
           onkeydown="if(event.key==='Enter'){executeFormula();event.preventDefault()}">
    <span id="status" style="min-width:200px">Ready</span>
  </div>
  <div id="content">
    <div id="grid-container"></div>
    <div id="sidebar">
      <div id="sidebar-tabs">
        <button class="active" onclick="switchTab('ai')">🤖 AI</button>
        <button onclick="switchTab('tables')">📊 Tables</button>
      </div>
      <div id="ai-panel">
        <div id="ai-messages">
          <div class="msg assistant">Configure AI backend with ⚙️ button, then ask me about your data.</div>
        </div>
        <div id="ai-input-area">
          <input id="ai-input" placeholder="e.g. Show top 3 products by revenue..." onkeydown="if(event.key==='Enter')askAI()">
          <button id="ai-send" onclick="askAI()">Send</button>
          <button id="ai-settings-btn" onclick="toggleAISettings()" style="background:#2a2a2a;color:#888;border:1px solid #333;border-radius:4px;cursor:pointer;padding:8px 10px;font-size:16px;">⚙️</button>
        </div>
        <div id="ai-settings" style="display:none;padding:8px;margin-top:8px;background:#0d0d0d;border-radius:4px;">
          <select id="ai-backend" onchange="onAIBackendChange()" style="width:100%;padding:6px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;margin-bottom:6px;">
            <option value="local">🖥️ Local (Ollama)</option>
            <option value="xai">✖️ xAI (Grok)</option>
            <option value="openai">🧠 OpenAI</option>
          </select>
          <input id="ai-api-key" type="password" placeholder="API Key (local = skip)" style="width:100%;padding:6px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;margin-bottom:6px;">
          <input id="ai-endpoint" placeholder="Endpoint URL (default auto)" style="width:100%;padding:6px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;margin-bottom:6px;">
          <input id="ai-model" placeholder="Model name (default auto)" style="width:100%;padding:6px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;">
        </div>
      </div>
      <div id="table-list" style="display:none"></div>
    </div>
  </div>
</div>

<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm/+esm';

// ── Globals ──
let db, conn, hot;
let currentTable = 'sales';
let quackConnected = false;
const QUACK_SERVER = 'localhost';
const QUACK_PORT = '9494';
const QUACK_TOKEN = 'columnar-sheet-token-2026';

// ── Init DuckDB-Wasm ──
async function initDuckDB() {
  setStatus('Loading DuckDB-Wasm...');
  const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();
  const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);

  // CORS-safe worker instantiation
  const worker_url = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], {type: 'text/javascript'})
  );
  const worker = new Worker(worker_url);
  const logger = new duckdb.ConsoleLogger();
  db = new duckdb.AsyncDuckDB(logger, worker);
  await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
  URL.revokeObjectURL(worker_url);

  conn = await db.connect();
  setStatus('DuckDB-Wasm ready');
}

// ── Quack Connection ──
async function connectQuack() {
  const btn = document.getElementById('btn-quack');
  if (quackConnected) return;

  setStatus('Connecting to Quack server...');
  try {
    // Try loading Quack extension in WASM
    await conn.query(`INSTALL quack`);
    await conn.query(`LOAD quack`);
    // Create secret and attach
    await conn.query(`CREATE SECRET (TYPE quack, TOKEN '${QUACK_TOKEN}', SCOPE 'quack:${QUACK_SERVER}:${QUACK_PORT}')`);
    await conn.query(`ATTACH 'quack:${QUACK_SERVER}:${QUACK_PORT}' AS remote`);

    quackConnected = true;
    btn.textContent = 'Quack: ON';
    btn.className = 'connected';
    setStatus('Quack connected');

    // Load tables
    await loadTableList();
    await loadTable('sales');
  } catch (e) {
    console.error('Quack connection failed:', e);
    setStatus(`Quack failed: ${e.message.substring(0, 60)}...`);
    // Fallback: load local sample data
    await loadLocalFallback();
  }
}

// ── Fallback: local DuckDB-Wasm only ──
async function loadLocalFallback() {
  setStatus('Quack unavailable — using local mode');
  document.getElementById('btn-quack').className = 'disconnected';
  document.getElementById('btn-quack').textContent = 'Quack: Local';

  // Load CSV from the HTTP server into DuckDB-Wasm's virtual filesystem
  try {
    const csvResp = await fetch('sample_data/sales.csv');
    const csvText = await csvResp.text();
    await db.registerFileText('sales.csv', csvText);
    await conn.query(`CREATE TABLE sales AS SELECT * FROM read_csv_auto('sales.csv', header=true)`);
  } catch(e) {
    console.error('Local data load failed:', e);
    setStatus('Local data load failed');
    return;
  }
  currentTable = 'sales';
  await loadTable('sales');
  setStatus('Local mode ready — 10 rows loaded');
}

// ── Load table list ──
async function loadTableList() {
  const container = document.getElementById('table-list');
  try {
    let tables;
    if (quackConnected) {
      // Quack: use query() to run SHOW TABLES on remote server
      const result = await conn.query(`FROM remote.query('SHOW TABLES')`);
      tables = result.toArray().map(r => r[0]);
    } else {
      const result = await conn.query(`SELECT table_name FROM duckdb_tables()`);
      tables = result.toArray().map(r => r[0]);
    }
    container.innerHTML = tables.map(t =>
      `<div class="table-item ${t===currentTable?'selected':''}" onclick="loadTable('${t}')">📊 ${t}</div>`
    ).join('');
  } catch(e) {
    console.warn('loadTableList failed:', e);
    container.innerHTML = `<div style="color:#888;padding:12px;">No tables loaded</div>`;
  }
}

// ── Load table data into grid ──
async function loadTable(name) {
  currentTable = name;
  setStatus(`Loading ${name}...`);

  const prefix = quackConnected ? 'remote.' : '';

  // Use _id as primary key for write-back targeting
  const result = await conn.query(`SELECT _id, * FROM ${prefix}${name} LIMIT 1000`);
  const allCols = result.schema.fields.map(f => f.name);
  const columns = allCols.filter(c => c !== '_id'); // display columns (exclude _id)
  _ids = []; // store _id values for write-back
  const data = result.toArray().map(row => {
    const obj = {};
    allCols.forEach((col, i) => {
      if (col === '_id') {
        obj._id = row[i];
        _ids.push(row[i]);
      } else {
        obj[col] = row[i];
      }
    });
    return obj;
  });

  renderGrid(columns, data);
  setStatus(`${name}: ${data.length} rows loaded`);

  // Update table list
  await loadTableList();
}

let _ids = []; // current _id values for write-back

// ── Render Handsontable grid ──
function renderGrid(columns, data) {
  const container = document.getElementById('grid-container');
  container.innerHTML = '';

  const displayColumns = columns.filter(c => c !== '_id');

  hot = new Handsontable(container, {
    data: data,
    columns: columns.map(c => {
      if (c === '_id') return { data: c, width: 0 };
      return { data: c, title: c };
    }),
    rowHeaders: true,
    colHeaders: displayColumns,
    licenseKey: 'non-commercial-and-evaluation',
    height: '100%',
    width: '100%',
    stretchH: 'all',
    contextMenu: true,
    filters: true,
    dropdownMenu: true,
    multiColumnSorting: true,
    manualColumnResize: true,
    afterChange: async (changes, source) => {
      if (source === 'loadData') return;
      if (!changes) return;
      for (const [row, col, oldVal, newVal] of changes) {
        if (oldVal === newVal) continue;
        const idVal = _ids[row];
        const colName = columns[hot.propToCol(col)];
        if (!idVal || !colName || colName === '_id') continue;

        const safeVal = newVal == null ? 'NULL' : `'${String(newVal).replace(/'/g, "''")}'`;
        const prefix = quackConnected ? 'remote.' : '';
        const updateInner = `UPDATE ${currentTable} SET "${colName}" = ${safeVal} WHERE _id = ${idVal}`;
        const sql = quackConnected
          ? `FROM ${prefix}query('${updateInner.replace(/'/g, "''")}')`
          : updateInner;

        try {
          await conn.query(sql);
          setStatus(`✅ Updated ${currentTable}."${colName}" [id=${idVal}]`);
        } catch(e) {
          setStatus(`❌ Write failed: ${e.message.substring(0, 50)}`);
          console.error('Write-back error:', e);
        }
      }
    },
    afterSelection: (r, c) => {
      const val = hot.getDataAtCell(r, c);
      document.getElementById('formula-bar').value = val ?? '';
    }
  });
}

// ── AI Assistant ──
function getAIConfig() {
  const backend = document.getElementById('ai-backend').value;
  const key = document.getElementById('ai-api-key').value.trim();
  const endpoint = document.getElementById('ai-endpoint').value.trim();
  const model = document.getElementById('ai-model').value.trim();

  const defaults = {
    local:  { url: endpoint || 'http://localhost:11434/v1/chat/completions', model: model || 'qwen2.5:14b', key: 'ollama' },
    xai:    { url: endpoint || 'https://api.x.ai/v1/chat/completions', model: model || 'grok-4', key: key },
    openai: { url: endpoint || 'https://api.openai.com/v1/chat/completions', model: model || 'gpt-4o', key: key },
  };
  const cfg = defaults[backend] || defaults.local;
  return { url: cfg.url, model: cfg.model, key: cfg.key };
}

function toggleAISettings() {
  const el = document.getElementById('ai-settings');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function onAIBackendChange() {
  const backend = document.getElementById('ai-backend').value;
  const keyInput = document.getElementById('ai-api-key');
  keyInput.style.display = backend === 'local' ? 'none' : 'block';
  if (backend === 'local') keyInput.value = '';
}

async function askAI() {
  const input = document.getElementById('ai-input');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';

  addMessage('user', question);

  // Get schema using DESCRIBE (works for both local and remote)
  let schemaInfo;
  try {
    const prefix = quackConnected ? 'remote.' : '';
    const r = await conn.query(`DESCRIBE ${prefix}${currentTable}`);
    schemaInfo = r.toArray().map(r => `${r[0]} (${r[1]})`).join(', ');
  } catch(e) {
    schemaInfo = '(schema unavailable)';
  }

  const sqlPrompt = `You are a DuckDB SQL expert. Schema: ${schemaInfo}. Table: ${currentTable}.\nConvert to DuckDB SQL: "${question}"\nReturn ONLY the SQL, no explanation, no markdown.`;

  addMessage('assistant', '🤔 Generating SQL...');

  try {
    const cfg = getAIConfig();
    if (!cfg.key) throw new Error('API key not configured. Click ⚙️ to set up.');

    const aiResp = await fetch(cfg.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.key}` },
      body: JSON.stringify({ model: cfg.model, messages: [{ role: 'user', content: sqlPrompt }], temperature: 0 })
    });

    if (!aiResp.ok) {
      const errText = await aiResp.text().catch(() => '');
      throw new Error(`AI API ${aiResp.status}: ${errText.substring(0, 80)}`);
    }

    const aiData = await aiResp.json();
    let sql = aiData.choices[0].message.content.trim();
    sql = sql.replace(/```sql\n?/g, '').replace(/```/g, '').trim();

    addMessage('assistant', `<div class="sql">${sql}</div>`);

    // Execute SQL — use remote prefix for table references
    const prefix = quackConnected ? 'remote.' : '';
    const execSql = sql.replace(new RegExp(`\\b${currentTable}\\b`, 'g'), `${prefix}${currentTable}`);
    const execResult = await conn.query(execSql);
    const cols = execResult.schema.fields.map(f => f.name);
    const rows = execResult.toArray().map(row => {
      const obj = {};
      cols.forEach((c, i) => obj[c] = row[i]);
      return obj;
    });

    renderGrid(cols, rows);
    addMessage('assistant', `✅ ${rows.length} rows returned`);
    setStatus(`Query done: ${rows.length} rows`);
  } catch (e) {
    addMessage('assistant', `❌ ${e.message}`);
  }
}

function addMessage(role, text) {
  const container = document.getElementById('ai-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ── Row Operations ──
async function addRow() {
  // Get current columns from the grid to build INSERT
  const displayCols = hot.getColHeader().filter(c => c !== '_id');
  if (!displayCols.length) return;

  // Build INSERT with auto-increment _id
  const prefix = quackConnected ? 'remote.' : '';
  const colList = '"_id", ' + displayCols.map(c => `"${c}"`).join(', ');
  const nextIdExpr = `(SELECT COALESCE(MAX(_id), 0) + 1 FROM ${currentTable})`;
  const valList = `${nextIdExpr}, ` + displayCols.map(() => 'NULL').join(', ');
  const insertInner = `INSERT INTO ${currentTable} (${colList}) VALUES (${valList})`;
  const insertSql = quackConnected
    ? `FROM ${prefix}query('${insertInner.replace(/'/g, "''")}')`
    : insertInner;

  try {
    await conn.query(insertSql);
    setStatus(`✅ New row added to ${currentTable}`);
    await loadTable(currentTable);
    // Scroll to bottom
    hot.scrollViewportTo(hot.countRows() - 1, 0);
  } catch(e) {
    setStatus(`❌ Insert failed: ${e.message.substring(0, 50)}`);
  }
}

async function deleteSelectedRows() {
  const selected = hot.getSelected();
  if (!selected || !selected.length) {
    setStatus('Select rows first');
    return;
  }

  const rowsToDelete = new Set();
  for (const [r1, , r2] of selected) {
    for (let r = Math.min(r1, r2); r <= Math.max(r1, r2); r++) {
      rowsToDelete.add(_ids[r]);
    }
  }

  if (!rowsToDelete.size) { setStatus('No rows selected'); return; }

  const prefix = quackConnected ? 'remote.' : '';
  for (const id of rowsToDelete) {
    try {
      const delSql = quackConnected
        ? `FROM ${prefix}query('DELETE FROM ${currentTable} WHERE _id = ${id}')`
        : `DELETE FROM ${currentTable} WHERE _id = ${id}`;
      await conn.query(delSql);
    } catch(e) {
      setStatus(`❌ Delete id=${id} failed: ${e.message.substring(0, 40)}`);
      return;
    }
  }
  setStatus(`✅ Deleted ${rowsToDelete.size} row(s)`);
  await loadTable(currentTable);
}

// ── CSV Import/Export ──
async function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  setStatus(`Importing ${file.name}...`);

  const text = await file.text();
  const tableName = file.name.replace(/\.csv$/i, '').replace(/[^a-zA-Z0-9_]/g, '_');

  // Register file in DuckDB-Wasm virtual FS and create table
  await db.registerFileText('_import.csv', text);
  const prefix = quackConnected ? 'remote.' : '';

  if (quackConnected) {
    // Import to remote via query
    const createSql = `CREATE TABLE ${tableName} AS SELECT row_number() OVER () AS _id, * FROM read_csv_auto('_import.csv', header=true)`;
    await conn.query(`FROM ${prefix}query('${createSql.replace(/'/g, "''")}')`);
  } else {
    await conn.query(`CREATE TABLE ${tableName} AS SELECT row_number() OVER () AS _id, * FROM read_csv_auto('_import.csv', header=true)`);
  }

  currentTable = tableName;
  await loadTableList();
  await loadTable(tableName);
  setStatus(`✅ Imported ${tableName}: ${hot.countRows()} rows`);
  event.target.value = '';
}

function exportCSV() {
  const data = hot.getData();
  const headers = hot.getColHeader();
  const csv = [headers.join(','), ...data.map(row => row.map(v => `"${(v ?? '').toString().replace(/"/g, '""')}"`).join(','))].join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${currentTable}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  setStatus(`✅ Exported ${data.length} rows`);
}
function executeFormula() {
  const bar = document.getElementById('formula-bar');
  const val = bar.value.trim();
  if (!val) return;

  // If a cell is selected, write the value to it
  const selected = hot.getSelected();
  if (selected && selected.length) {
    const [r, c] = selected[0];
    hot.setDataAtCell(r, c, val, 'edit');
  }
}

// ── UI Helpers ──
function switchTab(tab) {
  document.querySelectorAll('#sidebar-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#sidebar-tabs button:nth-child(${tab==='ai'?1:2})`).classList.add('active');
  document.getElementById('ai-panel').style.display = tab === 'ai' ? 'flex' : 'none';
  document.getElementById('table-list').style.display = tab === 'tables' ? 'block' : 'none';
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ── Global functions for onclick handlers ──
window.loadTable = loadTable;
window.connectQuack = connectQuack;
window.askAI = askAI;
window.switchTab = switchTab;
window.toggleAISettings = toggleAISettings;
window.onAIBackendChange = onAIBackendChange;
window.addRow = addRow;
window.deleteSelectedRows = deleteSelectedRows;
window.executeFormula = executeFormula;
window.importCSV = importCSV;
window.exportCSV = exportCSV;
window.currentTable = currentTable;

// ── Boot ──
(async function boot() {
  await initDuckDB();
  // Try Quack first, fall back to local
  await connectQuack();
})();
</script>
</body>
</html>
