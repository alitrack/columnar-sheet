<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColumnarSheet — DuckDB + Quack Canvas Grid</title>
<script src="canvas-grid.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: #1a1a1a; border-bottom: 1px solid #333; min-height: 40px; }
  #toolbar h1 { font-size: 17px; color: #f0c040; margin-right: 20px; }
  #toolbar button { padding: 5px 14px; border: 1px solid #444; background: #2a2a2a; color: #ccc; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
  #toolbar button:hover { background: #3a3a3a; }
  #toolbar button.connected { border-color: #4caf50; color: #4caf50; }
  #toolbar button.disconnected { border-color: #f44336; color: #f44336; }
  #status { font-size: 11px; color: #888; flex: 1; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #content { display: flex; flex: 1; overflow: hidden; }
  #grid-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #grid-container { flex: 1; overflow: hidden; position: relative; }
  #sidebar { width: 340px; background: #141414; border-left: 1px solid #333; display: flex; flex-direction: column; }
  #sidebar-tabs { display: flex; border-bottom: 1px solid #333; }
  #sidebar-tabs button { flex: 1; padding: 9px; background: none; border: none; color: #888; cursor: pointer; font-size: 13px; }
  #sidebar-tabs button.active { color: #f0c040; border-bottom: 2px solid #f0c040; }
  #ai-panel { flex: 1; display: flex; flex-direction: column; padding: 12px; overflow: hidden; }
  #ai-messages { flex: 1; overflow-y: auto; font-size: 13px; margin-bottom: 10px; }
  #ai-messages .msg { margin-bottom: 8px; padding: 8px; border-radius: 6px; word-break: break-word; }
  #ai-messages .msg.user { background: #1e3a5f; margin-left: 24px; }
  #ai-messages .msg.assistant { background: #1a2a1a; margin-right: 24px; }
  #ai-messages .msg.sql { font-family: monospace; background: #0d0d0d; padding: 8px; border-radius: 4px; margin: 4px 0; font-size: 12px; color: #7ec87e; white-space: pre-wrap; }
  #ai-input-area { display: flex; gap: 8px; }
  #ai-input { flex: 1; padding: 8px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; font-size: 13px; }
  #ai-send { padding: 8px 16px; background: #f0c040; color: #0f0f0f; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
  #table-list { padding: 12px; font-size: 13px; overflow-y: auto; }
  #table-list .table-item { padding: 6px 8px; cursor: pointer; border-radius: 4px; }
  #table-list .table-item:hover { background: #2a2a2a; }
  #table-list .table-item.selected { background: #1e3a5f; }
  #stats-panel { padding: 12px; overflow-y: auto; font-size: 13px; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <h1>🦆 ColumnarSheet</h1>
    <button id="btn-quack" class="disconnected" onclick="connectQuack()">Quack: OFF</button>
    <button onclick="undo()" title="Undo (Ctrl+Z)">↩</button>
    <button onclick="redo()" title="Redo (Ctrl+Y)">↪</button>
    <button onclick="addRow()" title="Add row">＋ Row</button>
    <button onclick="deleteSelectedRows()" title="Delete selected rows">🗑 Del</button>
    <button id="btn-refresh" onclick="loadTable(currentTable)">⟳</button>
    <button onclick="document.getElementById('csv-upload').click()">📥 CSV</button>
    <button onclick="exportCSV()">📤 CSV</button>
    <button id="btn-autorefresh" onclick="toggleAutoRefresh()" title="Toggle auto-refresh (collaboration sync)">🔁 Sync</button>
    <input id="csv-upload" type="file" accept=".csv" style="display:none" onchange="importCSV(event)">
    <input id="formula-bar" placeholder="=SUM(revenue) | =AVG(B) | =price*qty | Ctrl+Enter to evaluate..."
           style="flex:1;padding:5px 12px;background:#0d0d0d;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-family:monospace;font-size:13px;"
           onkeydown="if(event.key==='Enter'){executeFormula();event.preventDefault()}">
    <span id="status">Ready</span>
  </div>
  <div id="content">
    <div id="grid-area">
      <div id="grid-container"></div>
      <div id="load-more-bar" style="display:none;padding:8px;text-align:center;background:#1a1a1a;border-top:1px solid #333;">
        <button id="load-more-btn" onclick="loadMore()" style="padding:6px 24px;background:#2a2a2a;color:#ccc;border:1px solid #444;border-radius:4px;cursor:pointer;font-size:13px;">
          Load more rows...
        </button>
      </div>
    </div>
    <div id="sidebar">
      <div id="sidebar-tabs">
        <button class="active" onclick="switchTab('ai')">🤖 AI</button>
        <button onclick="switchTab('tables')">📊 Tables</button>
        <button onclick="switchTab('stats')">📈 Stats</button>
      </div>
      <div id="ai-panel">
        <div id="ai-messages">
          <div class="msg assistant">AI ready. Use ⚙️ to configure backend, then ask about your data.</div>
        </div>
        <div id="ai-input-area">
          <input id="ai-input" placeholder="e.g. top 5 categories by revenue..." onkeydown="if(event.key==='Enter')askAI()">
          <button id="ai-send" onclick="askAI()">Send</button>
          <button id="ai-settings-btn" onclick="toggleAISettings()" style="background:#2a2a2a;color:#888;border:1px solid #333;border-radius:4px;cursor:pointer;padding:8px 10px;font-size:16px;">⚙️</button>
        </div>
        <div id="ai-settings" style="display:none;padding:8px;margin-top:8px;background:#0d0d0d;border-radius:4px;">
          <select id="ai-backend" onchange="onAIBackendChange()" style="width:100%;padding:6px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;margin-bottom:6px;">
            <option value="moonbridge" selected>🌉 MoonBridge (DeepSeek)</option>
            <option value="local">🖥️ Local (Ollama)</option>
            <option value="xai">✖️ xAI (Grok)</option>
            <option value="openai">🧠 OpenAI</option>
          </select>
          <input id="ai-api-key" type="password" placeholder="API Key (moonbridge/local = skip)" style="width:100%;padding:6px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;margin-bottom:6px;">
          <input id="ai-endpoint" placeholder="Endpoint URL (default auto)" style="width:100%;padding:6px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;margin-bottom:6px;">
          <input id="ai-model" placeholder="Model name (default auto)" style="width:100%;padding:6px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;">
          <button onclick="clearAICache()" style="margin-top:6px;width:100%;padding:6px;background:#2a1a1a;color:#f66;border:1px solid #633;border-radius:4px;cursor:pointer;font-size:12px;">🗑 Clear SQL Cache</button>
        </div>
      </div>
      <div id="table-list" style="display:none"></div>
      <div id="stats-panel" style="display:none">
        <div id="stats-content">Click a table to load stats</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm/+esm';

// ── Globals ──
let db, conn, grid;
let currentTable = 'sales';
let quackConnected = false;
const QUACK_SERVER = 'localhost';
const QUACK_PORT = '9494';
const QUACK_TOKEN = 'columnar-sheet-token-2026';
const PAGE_SIZE = 500;

let _pageOffset = 0;
let _totalRows = 0;
let _ids = [];

// ── Init DuckDB-Wasm ──
async function initDuckDB() {
  setStatus('Loading DuckDB-Wasm...');
  const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();
  const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);

  const worker_url = URL.createObjectURL(
    new Blob([`importScripts("${bundle.mainWorker}");`], {type: 'text/javascript'})
  );
  const worker = new Worker(worker_url);
  const logger = new duckdb.ConsoleLogger();
  db = new duckdb.AsyncDuckDB(logger, worker);
  await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
  URL.revokeObjectURL(worker_url);

  conn = await db.connect();
  setStatus('DuckDB-Wasm ready');
}

// ── Convert DuckDB Arrow result to columnar format ──
function arrowToColumnar(result) {
  const colNames = result.schema.fields.map(f => f.name);
  const rows = result.toArray();
  const colData = {};
  const idData = [];

  for (const name of colNames) {
    colData[name] = [];
  }

  for (const row of rows) {
    colNames.forEach((name, i) => {
      colData[name].push(row[i]);
    });
    if (colData._id) idData.push(colData._id[colData._id.length - 1]);
  }

  return { colData, idData: colData._id || idData, colNames };
}

// ── Quack Connection ──
async function connectQuack() {
  const btn = document.getElementById('btn-quack');
  if (quackConnected) return;

  setStatus('Connecting to Quack server...');
  try {
    await conn.query(`INSTALL quack`);
    await conn.query(`LOAD quack`);
    await conn.query(`CREATE SECRET (TYPE quack, TOKEN '${QUACK_TOKEN}', SCOPE 'quack:${QUACK_SERVER}:${QUACK_PORT}')`);
    await conn.query(`ATTACH 'quack:${QUACK_SERVER}:${QUACK_PORT}' AS remote`);

    quackConnected = true;
    btn.textContent = 'Quack: ON';
    btn.className = 'connected';
    setStatus('Quack connected');

    await loadTableList();
    await loadTable('sales');
  } catch (e) {
    console.error('Quack failed:', e);
    setStatus(`Quack failed: ${e.message.substring(0, 60)}`);
    await loadLocalFallback();
  }
}

async function loadLocalFallback() {
  setStatus('Quack unavailable — local mode');
  document.getElementById('btn-quack').className = 'disconnected';
  document.getElementById('btn-quack').textContent = 'Quack: Local';
  try {
    const csvResp = await fetch('sample_data/sales.csv');
    const csvText = await csvResp.text();
    await db.registerFileText('sales.csv', csvText);
    await conn.query(`CREATE TABLE sales AS SELECT * FROM read_csv_auto('sales.csv', header=true)`);
  } catch(e) {
    setStatus('Local data load failed');
    return;
  }
  currentTable = 'sales';
  await loadTable('sales');
  setStatus('Local mode ready');
}

// ── Table List ──
async function loadTableList() {
  const container = document.getElementById('table-list');
  try {
    let tableNames;
    if (quackConnected) {
      // Quick table discovery — probe known candidates
      const candidates = ['sales', 'products', 'regions'];
      tableNames = [];
      for (const t of candidates) {
        try {
          await conn.query(`SELECT * FROM remote.${t} LIMIT 1`);
          tableNames.push(t);
        } catch(e) {}
      }
      if (tableNames.length === 0 && currentTable) tableNames = [currentTable];
    } else {
      const result = await conn.query(`SELECT table_name FROM duckdb_tables()`);
      tableNames = result.toArray().map(r => r[0]);
    }

    // Get row counts
    const counts = {};
    for (const t of tableNames) {
      try {
        const prefix = quackConnected ? 'remote.' : '';
        const cr = quackConnected
          ? await conn.query(`FROM ${prefix}query('SELECT count(*) FROM ${t}')`)
          : await conn.query(`SELECT count(*) FROM ${t}`);
        const rows = cr.toArray();
        counts[t] = (rows.length > 0 && rows[0][0] != null) ? Number(rows[0][0]) : 0;
      } catch(e) { counts[t] = 0; }
    }

    container.innerHTML = tableNames.map(t => `
      <div class="table-item ${t===currentTable?'selected':''}" style="display:flex;align-items:center;justify-content:space-between;">
        <span onclick="loadTable('${t}')" style="flex:1;cursor:pointer;">📊 ${t}</span>
        <span style="color:#888;font-size:11px;margin-right:8px;">${counts[t]||'?'} rows</span>
        <span style="display:flex;gap:4px;">
          <button onclick="event.stopPropagation();duplicateTable('${t}')" title="Duplicate" style="background:none;border:none;color:#888;cursor:pointer;font-size:11px;">📋</button>
          <button onclick="event.stopPropagation();renameTablePrompt('${t}')" title="Rename" style="background:none;border:none;color:#888;cursor:pointer;font-size:11px;">✏️</button>
          ${t !== currentTable ? `<button onclick="event.stopPropagation();dropTable('${t}')" title="Delete" style="background:none;border:none;color:#f66;cursor:pointer;font-size:11px;">🗑</button>` : ''}
        </span>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML = `<div style="color:#888;padding:12px;">No tables</div>`;
  }
}

// ── Load Table → Canvas Grid ──
async function loadTable(name, append = false) {
  currentTable = name;
  if (!append) { _pageOffset = 0; _ids = []; }
  setStatus(`Loading ${name}...`);

  const prefix = quackConnected ? 'remote.' : '';

  // Get total count
  if (!append) {
    try {
      if (quackConnected) {
        const cr = await conn.query(`FROM ${prefix}query('SELECT count(*) AS cnt FROM ${currentTable}')`);
        const rows = cr.toArray();
        _totalRows = (rows.length > 0 && rows[0][0] != null) ? Number(rows[0][0]) : 0;
      } else {
        const cr = await conn.query(`SELECT count(*)::BIGINT AS cnt FROM ${currentTable}`);
        _totalRows = Number(cr.toArray()[0][0]);
      }
    } catch(e) { _totalRows = 0; }
  }

  // Load page
  const result = await conn.query(`SELECT _id, * FROM ${prefix}${name} ORDER BY _id LIMIT ${PAGE_SIZE} OFFSET ${_pageOffset}`);
  const { colData, idData, colNames } = arrowToColumnar(result);

  _pageOffset += idData.length;
  if (append) {
    _ids.push(...idData);
    grid.appendColumnarData(colData, idData);
  } else {
    _ids = idData;
    grid.setColumns(colNames.map(n => ({ name: n, type: 'auto' })));
    grid.setColumnarData(colData, idData);
    grid.setTotalRows(_totalRows);
  }

  // Detect end of data
  if (_totalRows === 0 && idData.length < PAGE_SIZE) {
    _totalRows = grid.rowCount;
    grid.setTotalRows(_totalRows);
  }

  grid.render();
  updateLoadMoreBar();
  const loaded = grid.rowCount;
  const total = _totalRows || '?';
  setStatus(`${name}: ${loaded.toLocaleString()} / ${typeof total === 'number' ? total.toLocaleString() : '?'} rows`);
  await loadTableList();
}

function loadMore() {
  if (_totalRows > 0 && grid.rowCount >= _totalRows) return;
  loadTable(currentTable, true);
}

function updateLoadMoreBar() {
  const bar = document.getElementById('load-more-bar');
  const btn = document.getElementById('load-more-btn');
  const loaded = grid.rowCount;
  const hasMore = _totalRows === 0 || loaded < _totalRows;
  bar.style.display = hasMore ? 'block' : 'none';
  if (hasMore) {
    const remaining = _totalRows > 0 ? ` (${(_totalRows - loaded).toLocaleString()} remaining)` : '';
    btn.textContent = `Load more...${remaining}`;
  }
}

// ── Table Management ──
async function duplicateTable(name) {
  const newName = name + '_copy';
  const prefix = quackConnected ? 'remote.' : '';
  try {
    const sql = `CREATE TABLE ${newName} AS SELECT * FROM ${name}`;
    if (quackConnected) {
      await conn.query(`FROM ${prefix}query('${sql.replace(/'/g, "''")}')`);
    } else {
      await conn.query(sql);
    }
    setStatus(`✅ Duplicated: ${newName}`);
    await loadTableList();
  } catch(e) {
    setStatus(`❌ Duplicate failed: ${e.message.substring(0, 50)}`);
  }
}

function renameTablePrompt(name) {
  const newName = prompt(`Rename table "${name}":`, name);
  if (!newName || newName === name) return;
  renameTable(name, newName);
}

async function renameTable(oldName, newName) {
  const prefix = quackConnected ? 'remote.' : '';
  try {
    const sql = `ALTER TABLE ${oldName} RENAME TO ${newName}`;
    if (quackConnected) {
      await conn.query(`FROM ${prefix}query('${sql.replace(/'/g, "''")}')`);
    } else {
      await conn.query(sql);
    }
    if (currentTable === oldName) currentTable = newName;
    setStatus(`✅ Renamed: ${oldName} → ${newName}`);
    await loadTableList();
    if (currentTable === newName) await loadTable(newName);
  } catch(e) {
    setStatus(`❌ Rename failed: ${e.message.substring(0, 50)}`);
  }
}

async function dropTable(name) {
  if (!confirm(`Delete table "${name}"? This cannot be undone.`)) return;
  const prefix = quackConnected ? 'remote.' : '';
  try {
    const sql = `DROP TABLE ${name}`;
    if (quackConnected) {
      await conn.query(`FROM ${prefix}query('${sql.replace(/'/g, "''")}')`);
    } else {
      await conn.query(sql);
    }
    setStatus(`✅ Dropped: ${name}`);
    if (currentTable === name) currentTable = 'sales';
    await loadTableList();
    await loadTable(currentTable);
  } catch(e) {
    setStatus(`❌ Drop failed: ${e.message.substring(0, 50)}`);
  }
}

// ── Collaboration: auto-refresh ──
let _autoRefreshInterval = null;
function enableAutoRefresh(seconds = 30) {
  if (_autoRefreshInterval) clearInterval(_autoRefreshInterval);
  _autoRefreshInterval = setInterval(async () => {
    if (!quackConnected || !currentTable) return;
    try {
      // Reload table list silently
      await loadTableList();
      // Quick refresh: reload current page to pick up changes
      const prefix = quackConnected ? 'remote.' : '';
      const result = await conn.query(`SELECT _id, * FROM ${prefix}${currentTable} ORDER BY _id LIMIT ${PAGE_SIZE}`);
      const { colData, idData } = arrowToColumnar(result);
      // Only update if row count changed (someone else added/deleted)
      if (idData.length !== grid.rowCount || (idData.length > 0 && idData[0] !== _ids[0])) {
        _ids = idData;
        _pageOffset = 0;
        grid.setColumns(Object.keys(colData).map(n => ({ name: n, type: 'auto' })));
        grid.setColumnarData(colData, idData);
        grid.render();
        updateLoadMoreBar();
        setStatus(`🔄 Auto-refreshed: ${grid.rowCount} rows`);
      }
    } catch(e) { /* silent */ }
  }, seconds * 1000);
  setStatus(`🔁 Auto-refresh every ${seconds}s`);
}

function disableAutoRefresh() {
  if (_autoRefreshInterval) clearInterval(_autoRefreshInterval);
  _autoRefreshInterval = null;
  setStatus('Auto-refresh off');
}

function toggleAutoRefresh() {
  const btn = document.getElementById('btn-autorefresh');
  if (_autoRefreshInterval) {
    disableAutoRefresh();
    btn.style.borderColor = '#444';
  } else {
    enableAutoRefresh(15); // 15s sync
    btn.style.borderColor = '#4caf50';
  }
}

// ── Cell Edit → Quack Write-back ──
let _isUndoRedo = false;
function onCellChange(row, colIndex, oldVal, newVal) {
  const idVal = _ids[row];
  const colName = grid.visibleCols[colIndex]?.name;
  if (!idVal || !colName) return;

  // Push undo BEFORE executing the change
  if (!_isUndoRedo) {
    grid.pushUndo(row, colIndex, colName, oldVal, newVal, idVal, currentTable);
  }

  const safeVal = newVal == null || newVal === '' ? 'NULL' : `'${String(newVal).replace(/'/g, "''")}'`;
  const prefix = quackConnected ? 'remote.' : '';
  const updateInner = `UPDATE ${currentTable} SET "${colName}" = ${safeVal} WHERE _id = ${idVal}`;
  const sql = quackConnected
    ? `FROM ${prefix}query('${updateInner.replace(/'/g, "''")}')`
    : updateInner;

  conn.query(sql).then(() => {
    setStatus(`✅ Updated ${currentTable}."${colName}" [id=${idVal}]`);
  }).catch(e => {
    setStatus(`❌ Write failed: ${e.message.substring(0, 50)}`);
  });
}

function onSelectionChange(sel) {
  if (sel) {
    const val = grid.getCell(sel.startRow, sel.startCol);
    document.getElementById('formula-bar').value = val ?? '';
  }
}

// ── Row Operations ──
async function addRow() {
  const displayCols = grid.visibleCols.map(c => c.name);
  if (!displayCols.length) return;

  const prefix = quackConnected ? 'remote.' : '';
  const colList = '"_id", ' + displayCols.map(c => `"${c}"`).join(', ');
  const nextIdExpr = `(SELECT COALESCE(MAX(_id), 0) + 1 FROM ${currentTable})`;
  const valList = `${nextIdExpr}, ` + displayCols.map(() => 'NULL').join(', ');
  const insertInner = `INSERT INTO ${currentTable} (${colList}) VALUES (${valList})`;
  const insertSql = quackConnected
    ? `FROM ${prefix}query('${insertInner.replace(/'/g, "''")}')`
    : insertInner;

  try {
    await conn.query(insertSql);
    setStatus(`✅ New row added`);
    await loadTable(currentTable);
    grid.scrollToRow(grid.rowCount - 1);
  } catch(e) {
    setStatus(`❌ Insert failed: ${e.message.substring(0, 50)}`);
  }
}

async function deleteSelectedRows() {
  const ids = grid.getSelectedIds();
  if (!ids.size) { setStatus('Select rows first'); return; }

  const prefix = quackConnected ? 'remote.' : '';
  for (const id of ids) {
    try {
      const delInner = `DELETE FROM ${currentTable} WHERE _id = ${id}`;
      const sql = quackConnected
        ? `FROM ${prefix}query('${delInner.replace(/'/g, "''")}')`
        : delInner;
      await conn.query(sql);
    } catch(e) {
      setStatus(`❌ Delete id=${id} failed`);
      return;
    }
  }
  setStatus(`✅ Deleted ${ids.size} row(s)`);
  await loadTable(currentTable);
}

// ── CSV Import/Export ──
async function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  setStatus(`Importing ${file.name}...`);

  const text = await file.text();
  const tableName = file.name.replace(/\.csv$/i, '').replace(/[^a-zA-Z0-9_]/g, '_');

  await db.registerFileText('_import.csv', text);
  const prefix = quackConnected ? 'remote.' : '';

  if (quackConnected) {
    const createSql = `CREATE TABLE ${tableName} AS SELECT row_number() OVER () AS _id, * FROM read_csv_auto('_import.csv', header=true)`;
    await conn.query(`FROM ${prefix}query('${createSql.replace(/'/g, "''")}')`);
  } else {
    await conn.query(`CREATE TABLE ${tableName} AS SELECT row_number() OVER () AS _id, * FROM read_csv_auto('_import.csv', header=true)`);
  }

  currentTable = tableName;
  await loadTableList();
  await loadTable(tableName);
  setStatus(`✅ Imported ${tableName}`);
  event.target.value = '';
}

function exportCSV() {
  const cols = grid.visibleCols.map(c => c.name);
  const rows = [];
  for (let r = 0; r < grid.rowCount; r++) {
    rows.push(cols.map(c => {
      const v = grid.getCell(r, grid.visibleCols.findIndex(vc => vc.name === c));
      return v === null || v === undefined ? '' : `"${String(v).replace(/"/g, '""')}"`;
    }).join(','));
  }
  const csv = [cols.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${currentTable}.csv`; a.click();
  URL.revokeObjectURL(url);
  setStatus(`✅ Exported ${grid.rowCount} rows`);
}

function executeFormula() {
  const bar = document.getElementById('formula-bar');
  const val = bar.value.trim();
  if (!val) return;

  // Parse formulas starting with =
  if (val.startsWith('=')) {
    evaluateFormula(val.slice(1));
    return;
  }

  // Plain value → write to selected cell
  const sel = grid.getSelection();
  if (sel) {
    const colName = grid.visibleCols[sel.startCol]?.name;
    if (colName && grid._data[colName]) {
      grid._data[colName][sel.startRow] = val;
      grid.render();
      onCellChange(sel.startRow, sel.startCol, null, val);
    }
  }
}

async function evaluateFormula(formula) {
  const sel = grid.getSelection();
  if (!sel) { setStatus('Select a cell first for formula output'); return; }

  const targetRow = sel.startRow;
  const targetCol = sel.startCol;
  const targetColName = grid.visibleCols[targetCol]?.name;
  const prefix = quackConnected ? 'remote.' : '';

  // ── Helper: column letter → column name ──
  const colLetterToName = (letter) => {
    const idx = letter.toUpperCase().charCodeAt(0) - 65;
    return grid.visibleCols[idx]?.name || letter;
  };

  // ── Pattern 1: =FUNC(column) — aggregate over entire column ──
  const aggMatch = formula.match(/^(SUM|AVG|MIN|MAX|COUNT)\(\s*([a-zA-Z0-9_"]+)\s*\)$/i);
  if (aggMatch) {
    const func = aggMatch[1].toUpperCase();
    const col = aggMatch[2].replace(/^"(.*)"$/, '$1');
    const colName = colLetterToName(col);
    try {
      const r = await conn.query(`SELECT ${func}("${colName}") FROM ${prefix}${currentTable}`);
      const rows = r.toArray();
      const result = rows.length > 0 ? rows[0][0] : null;
      grid._data[targetColName][targetRow] = result;
      grid.render();
      onCellChange(targetRow, targetCol, null, result);
      setStatus(`✅ ${func}(${colName}) = ${result}`);
    } catch(e) {
      setStatus(`❌ Formula error: ${e.message.substring(0, 60)}`);
    }
    return;
  }

  // ── Pattern 2: =FUNC(col WHERE cond) — aggregate with filter ──
  const aggFilterMatch = formula.match(/^(SUM|AVG|MIN|MAX|COUNT)\(\s*([a-zA-Z0-9_"]+)\s+WHERE\s+(.+)\)$/i);
  if (aggFilterMatch) {
    const func = aggFilterMatch[1].toUpperCase();
    const col = aggFilterMatch[2].replace(/^"(.*)"$/, '$1');
    const colName = colLetterToName(col);
    const condition = aggFilterMatch[3];
    try {
      const r = await conn.query(`SELECT ${func}("${colName}") FROM ${prefix}${currentTable} WHERE ${condition}`);
      const rows = r.toArray();
      const result = rows.length > 0 ? rows[0][0] : null;
      grid._data[targetColName][targetRow] = result;
      grid.render();
      onCellChange(targetRow, targetCol, null, result);
      setStatus(`✅ ${func}(${colName} WHERE ${condition}) = ${result}`);
    } catch(e) {
      setStatus(`❌ Formula error: ${e.message.substring(0, 60)}`);
    }
    return;
  }

  // ── Pattern 3: =expression with column names — per-row computation ──
  // Replace A, B, C... with column names, then eval via DuckDB
  let exprSql = formula;
  for (let i = 0; i < grid.visibleCols.length; i++) {
    const letter = String.fromCharCode(65 + i);
    const cname = grid.visibleCols[i].name;
    // Match column letter as word boundary
    exprSql = exprSql.replace(new RegExp(`\\b${letter}\\b`, 'gi'), `"${cname}"`);
  }

  try {
    const idVal = _ids[targetRow];
    const r = await conn.query(`SELECT ${exprSql} FROM ${prefix}${currentTable} WHERE _id = ${idVal}`);
    const rows = r.toArray();
    const result = rows.length > 0 ? rows[0][0] : null;
    grid._data[targetColName][targetRow] = result;
    grid.render();
    onCellChange(targetRow, targetCol, null, result);
    setStatus(`✅ =${formula} = ${result !== null ? result : 'NULL'}`);
  } catch(e) {
    setStatus(`❌ Formula error: ${e.message.substring(0, 60)}`);
  }
}

// ── Undo/Redo ──
async function undo() {
  if (!grid.canUndo()) { setStatus('Nothing to undo'); return; }
  const entry = grid.popUndo();
  _isUndoRedo = true;
  try {
    // Write old value back to grid
    grid._data[entry.colName][entry.row] = entry.oldVal;
    grid.render();

    // Write old value back to DuckDB
    const safeVal = entry.oldVal == null || entry.oldVal === ''
      ? 'NULL' : `'${String(entry.oldVal).replace(/'/g, "''")}'`;
    const prefix = quackConnected ? 'remote.' : '';
    const sql = quackConnected
      ? `FROM ${prefix}query('UPDATE ${currentTable} SET "${entry.colName}" = ${safeVal} WHERE _id = ${entry.idVal}')`
      : `UPDATE ${currentTable} SET "${entry.colName}" = ${safeVal} WHERE _id = ${entry.idVal}`;
    await conn.query(sql);
    setStatus(`↩ Undo: ${entry.colName}[${entry.row}] restored`);
  } catch(e) {
    setStatus(`❌ Undo failed: ${e.message.substring(0, 50)}`);
  } finally {
    _isUndoRedo = false;
  }
}

async function redo() {
  if (!grid.canRedo()) { setStatus('Nothing to redo'); return; }
  const entry = grid.popRedo();
  _isUndoRedo = true;
  try {
    grid._data[entry.colName][entry.row] = entry.newVal;
    grid.render();

    const safeVal = entry.newVal == null || entry.newVal === ''
      ? 'NULL' : `'${String(entry.newVal).replace(/'/g, "''")}'`;
    const prefix = quackConnected ? 'remote.' : '';
    const sql = quackConnected
      ? `FROM ${prefix}query('UPDATE ${currentTable} SET "${entry.colName}" = ${safeVal} WHERE _id = ${entry.idVal}')`
      : `UPDATE ${currentTable} SET "${entry.colName}" = ${safeVal} WHERE _id = ${entry.idVal}`;
    await conn.query(sql);
    setStatus(`↪ Redo: ${entry.colName}[${entry.row}] restored`);
  } catch(e) {
    setStatus(`❌ Redo failed: ${e.message.substring(0, 50)}`);
  } finally {
    _isUndoRedo = false;
  }
}

// ── Sort handler ──
function onSort(sortState) {
  if (sortState) {
    setStatus(`Sorting by ${sortState.col} ${sortState.dir}...`);
  } else {
    setStatus('Sort cleared — loading default order...');
  }
  _pageOffset = 0;
  _ids = [];

  const prefix = quackConnected ? 'remote.' : '';
  let orderClause = sortState
    ? `ORDER BY "${sortState.col}" ${sortState.dir}`
    : 'ORDER BY _id';

  conn.query(`SELECT _id, * FROM ${prefix}${currentTable} ${orderClause} LIMIT ${PAGE_SIZE}`).then(result => {
    const { colData, idData } = arrowToColumnar(result);
    _ids = idData;
    _pageOffset = idData.length;
    grid.setColumns(Object.keys(colData).map(n => ({ name: n, type: 'auto' })));
    grid.setColumnarData(colData, idData);
    grid.setTotalRows(_totalRows);
    grid.render();
    updateLoadMoreBar();
    setStatus(`${currentTable}: ${idData.length} rows${sortState ? ` (sorted by ${sortState.col} ${sortState.dir})` : ''}`);
  }).catch(e => {
    setStatus(`Sort failed: ${e.message.substring(0, 50)}`);
  });
}

// ── AI Assistant ──
function getAIConfig() {
  const backend = document.getElementById('ai-backend').value;
  const key = document.getElementById('ai-api-key').value.trim();
  const endpoint = document.getElementById('ai-endpoint').value.trim();
  const model = document.getElementById('ai-model').value.trim();

  const defaults = {
    moonbridge: { url: endpoint || '/api/ai', model: model || 'deepseek-v4-flash', key: 'moonbridge' },
    local:      { url: endpoint || 'http://localhost:11434/v1/chat/completions', model: model || 'qwen2.5:14b', key: 'ollama' },
    xai:        { url: endpoint || 'https://api.x.ai/v1/chat/completions', model: model || 'grok-4', key: key },
    openai:     { url: endpoint || 'https://api.openai.com/v1/chat/completions', model: model || 'gpt-4o', key: key },
  };
  return defaults[backend] || defaults.moonbridge;
}

function toggleAISettings() {
  const el = document.getElementById('ai-settings');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function onAIBackendChange() {
  const backend = document.getElementById('ai-backend').value;
  const keyInput = document.getElementById('ai-api-key');
  const keyless = ['moonbridge', 'local'];
  keyInput.style.display = keyless.includes(backend) ? 'none' : 'block';
  if (keyless.includes(backend)) keyInput.value = '';
}

async function clearAICache() {
  try {
    await fetch('/api/ai-sql', { method: 'DELETE' });
    setStatus('✅ SQL cache cleared');
  } catch(e) {
    setStatus('Cache clear not supported');
  }
}

async function askAI() {
  const input = document.getElementById('ai-input');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';
  addMessage('user', question);

  // Get schema
  let schemaInfo;
  try {
    const prefix = quackConnected ? 'remote.' : '';
    const r = await conn.query(`DESCRIBE ${prefix}${currentTable}`);
    schemaInfo = r.toArray().map(r => `${r[0]} (${r[1]})`).join(', ');
  } catch(e) { schemaInfo = '(schema unavailable)'; }

  // Get ALL table schemas for cross-table AI queries
  const allSchemas = [];
  try {
    const tables = quackConnected
      ? (await conn.query(`FROM remote.query('SELECT table_name FROM information_schema.tables WHERE table_schema = ''main''')`)).toArray()
      : (await conn.query(`SELECT table_name FROM duckdb_tables()`)).toArray();
    const tableNames = tables.map(r => r[0]).filter(Boolean);

    for (const t of tableNames.slice(0, 5)) { // limit to 5 tables for token budget
      try {
        const prefix = quackConnected ? 'remote.' : '';
        const desc = await conn.query(`DESCRIBE ${prefix}${t}`);
        const cols = desc.toArray().map(r => `${r[0]} (${r[1]})`).join(', ');
        allSchemas.push(`  ${prefix}${t}: ${cols}`);
      } catch(e) {}
    }
  } catch(e) {}

  const tableRef = quackConnected ? `remote.${currentTable}` : currentTable;
  let schemaLines = [`Primary table: ${tableRef}`];
  if (allSchemas.length > 1) {
    schemaLines.push('All available tables:');
    schemaLines.push(...allSchemas);
  } else {
    schemaLines.push(`Columns: ${schemaInfo}`);
  }

  // Sample data
  try {
    const prefix = quackConnected ? 'remote.' : '';
    const sample = await conn.query(`SELECT * FROM ${prefix}${currentTable} LIMIT 3`);
    const sampleRows = sample.toArray();
    if (sampleRows.length > 0) {
      const colNames = sample.schema.fields.map(f => f.name);
      schemaLines.push(`Sample rows (${colNames.join(', ')}):`);
      sampleRows.forEach(row => {
        schemaLines.push(`  [${row.map(v => v === null ? 'NULL' : String(v).substring(0, 40)).join(', ')}]`);
      });
    }
  } catch(e) {}

  const sqlPrompt = `You are a DuckDB SQL expert. Given this schema:

${schemaLines.join('\n')}

Convert this natural language question to a SINGLE DuckDB SQL query:
"${question}"

Rules:
- Return ONLY the SQL, no explanation, no markdown fences
- Use proper quoting for column names (double quotes)
- Prefer simple, readable SQL over complex CTEs
- NEVER use DELETE, UPDATE, INSERT, or DROP — SELECT only`;

  addMessage('assistant', '🤔 Generating SQL...');

  let sql = null;
  let cached = false;

  // ── Try DuckDB AI with cache first (fast, free, smart) ──
  try {
    const aiSqlResp = await fetch('/api/ai-sql', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, schema: schemaLines.join('; ') })
    });
    if (aiSqlResp.ok) {
      const data = await aiSqlResp.json();
      sql = data.sql;
      cached = data.cached;
    }
  } catch(e) { /* fall through to MoonBridge */ }

  // ── Fallback: MoonBridge proxy ──
  if (!sql) {
    try {
      const cfg = getAIConfig();
      const aiResp = await fetch(cfg.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.key}` },
        body: JSON.stringify({ model: cfg.model, messages: [{ role: 'user', content: sqlPrompt }], temperature: 0 })
      });
      if (!aiResp.ok) {
        const errText = await aiResp.text().catch(() => '');
        throw new Error(`AI API ${aiResp.status}: ${errText.substring(0, 80)}`);
      }
      const aiData = await aiResp.json();
      sql = aiData.choices[0].message.content.trim();
    } catch(e) {
      addMessage('assistant', `❌ ${e.message}`);
      return;
    }
  }

  sql = sql.replace(/```sql\n?/g, '').replace(/```/g, '').trim();
  const cacheTag = cached ? ' ⚡cached' : '';
  addMessage('assistant', `<div class="sql">${sql}${cacheTag}</div>`);

    // Execute SQL
    const execSql = quackConnected ? sql : sql.replace(new RegExp(`\\b${currentTable}\\b`, 'g'), currentTable);
    const execResult = await conn.query(execSql);

    // Convert result to columnar and render
    const { colData, idData, colNames } = arrowToColumnar(execResult);
    _ids = idData;
    _totalRows = idData.length;

    grid.setColumns(colNames.map(n => ({ name: n, type: 'auto' })));
    grid.setColumnarData(colData, idData);
    grid.setTotalRows(_totalRows);
    grid.render();
    updateLoadMoreBar();

    addMessage('assistant', `✅ ${idData.length} rows`);
    setStatus(`Query done: ${idData.length} rows`);
  } catch (e) {
    addMessage('assistant', `❌ ${e.message}`);
  }
}

function addMessage(role, text) {
  const container = document.getElementById('ai-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ── Column Stats ──
async function loadStats() {
  const el = document.getElementById('stats-content');
  if (!currentTable) { el.textContent = 'No table loaded'; return; }
  el.innerHTML = 'Loading stats...';

  const prefix = quackConnected ? 'remote.' : '';
  try {
    const desc = await conn.query(`DESCRIBE ${prefix}${currentTable}`);
    const types = {};
    desc.toArray().forEach(r => { if (r[0] !== '_id') types[r[0]] = r[1]; });

    const totalStr = _totalRows > 0 ? _totalRows.toLocaleString() : grid.rowCount.toLocaleString();
    let html = `<div style="color:#f0c040;margin-bottom:8px;">📈 ${currentTable}</div>`;
    html += `<div style="color:#888;margin-bottom:12px;">~${totalStr} rows, ${Object.keys(types).length} cols</div>`;

    for (const [col, dtype] of Object.entries(types)) {
      html += `<div style="margin-bottom:10px;padding:8px;background:#1a1a1a;border-radius:4px;">`;
      html += `<div style="font-weight:600;">${col}</div><div style="color:#888;font-size:11px;">${dtype}</div>`;
      if (dtype && dtype.match(/INT|BIGINT|FLOAT|DOUBLE|DECIMAL|NUMERIC|REAL/i)) {
        try {
          const stats = await conn.query(`SELECT min("${col}"), max("${col}"), avg("${col}")::INTEGER FROM ${prefix}${currentTable}`);
          const rows = stats.toArray();
          if (rows.length > 0 && rows[0].length >= 3) {
            const s = rows[0];
            html += `<div style="color:#7ec87e;font-size:11px;margin-top:4px;">Min: ${Number(s[0]).toLocaleString()} | Max: ${Number(s[1]).toLocaleString()} | Avg: ${Number(s[2]).toLocaleString()}</div>`;
          }
        } catch(e) {}
      }
      html += `</div>`;
    }
    el.innerHTML = html;
  } catch(e) { el.innerHTML = `Stats unavailable: ${e.message}`; }
}

// ── UI ──
function switchTab(tab) {
  document.querySelectorAll('#sidebar-tabs button').forEach(b => b.classList.remove('active'));
  const idx = tab === 'ai' ? 0 : tab === 'tables' ? 1 : 2;
  document.querySelectorAll('#sidebar-tabs button')[idx].classList.add('active');
  document.getElementById('ai-panel').style.display = tab === 'ai' ? 'flex' : 'none';
  document.getElementById('table-list').style.display = tab === 'tables' ? 'block' : 'none';
  document.getElementById('stats-panel').style.display = tab === 'stats' ? 'block' : 'none';
  if (tab === 'stats') loadStats();
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ── Init Grid ──
function initGrid() {
  const container = document.getElementById('grid-container');
  grid = new CanvasGrid(container, { columns: [] });
  grid.on('cellchange', onCellChange);
  grid.on('selectionchange', onSelectionChange);
  grid.on('sort', onSort);

  // Keyboard shortcuts: Ctrl+Z / Ctrl+Y
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'z' || e.key === 'Z') {
        e.preventDefault();
        if (e.shiftKey) redo(); else undo();
      }
      if (e.key === 'y' || e.key === 'Y') {
        e.preventDefault();
        redo();
      }
    }
  });
}
